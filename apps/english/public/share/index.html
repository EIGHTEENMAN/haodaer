<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>童慧行·学英语 - 战绩</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    font-family: 'Press Start 2P', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #fff;
    padding: 16px;
  }
  .card {
    background: #1a1a2e;
    border: 3px solid #ffd700;
    padding: 20px;
    max-width: 320px;
    width: 100%;
    text-align: center;
  }
  .title { color: #ffd700; font-size: 14px; margin-bottom: 12px; }
  .player-icon { font-size: 48px; margin-bottom: 8px; }
  .player-name { color: #ffd700; font-size: 12px; margin-bottom: 4px; }
  .player-level { color: #88ccff; font-size: 10px; margin-bottom: 16px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat-value { color: #ffd700; font-size: 16px; margin-bottom: 2px; }
  .stat-label { color: #888; font-size: 7px; }
  .footer { color: #555; font-size: 7px; word-break: break-all; margin-top: 8px; }
  .empty { color: #666; font-size: 10px; padding: 40px 0; }
</style>
</head>
<body>
<div class="card" id="card">
  <div id="content">
    <div class="empty">暂无战绩数据</div>
  </div>
</div>
<script>
  // Parse URL params for Xiaotiancai WebView
  const params = new URLSearchParams(window.location.search)
  const score = params.get('s')
  if (score) {
    document.getElementById('content').innerHTML = `
      <div class="title">🏆 学英语战绩</div>
      <div class="player-icon">👦</div>
      <div class="player-name">小勇士</div>
      <div class="player-level">Lv.${params.get('l') || 1}</div>
      <div class="stats">
        <div><div class="stat-value">${parseInt(score).toLocaleString()}</div><div class="stat-label">得分</div></div>
        <div><div class="stat-value">${params.get('w') || 0}</div><div class="stat-label">单词</div></div>
        <div><div class="stat-value">${params.get('a') || 100}%</div><div class="stat-label">正确率</div></div>
        <div><div class="stat-value">${params.get('c') || 0}🔥</div><div class="stat-label">连击</div></div>
        <div><div class="stat-value">${params.get('m') || 0}</div><div class="stat-label">击杀</div></div>
      </div>
      <div class="footer">english.grandand.com</div>
    `
  }
</script>
</body>
</html>
